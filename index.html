<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мы вместе</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d6b27c;
    --gold-soft: #e9d3ae;
    --gold-dim: rgba(214, 178, 124, .45);
    --ink: #f5efe6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse 120% 90% at 50% -20%, rgba(112, 38, 62, .55), transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 120%, rgba(58, 22, 40, .6), transparent 60%),
      linear-gradient(160deg, #14080e 0%, #1d0b14 45%, #120710 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* мягкое дыхание света за заголовком */
  .glow {
    position: fixed;
    top: 18%;
    left: 50%;
    width: min(70vw, 700px);
    height: min(70vw, 700px);
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(199, 122, 122, .14), transparent 65%);
    animation: breathe 9s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes breathe {
    0%, 100% { opacity: .6; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 1;  transform: translate(-50%, -50%) scale(1.12); }
  }

  /* ---------- золотая пыль ---------- */
  .dust {
    position: fixed;
    border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 6px 1px var(--gold-dim);
    pointer-events: none;
    z-index: 1;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { transform: translateY(8vh)   translateX(0); opacity: 0; }
    12%  { opacity: var(--o, .5); }
    88%  { opacity: var(--o, .5); }
    100% { transform: translateY(-108vh) translateX(var(--sway, 20px)); opacity: 0; }
  }

  /* ---------- основной блок ---------- */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 24px;
    max-width: 1040px;
    width: 100%;
  }

  h1 {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(3rem, 9vw, 5.8rem);
    letter-spacing: .04em;
    background: linear-gradient(115deg, #f3e6cf 20%, var(--gold) 50%, #f7ecd8 80%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold-soft);
  }

  .rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin: 18px auto 14px;
  }

  .rule::before,
  .rule::after {
    content: '';
    height: 1px;
    width: clamp(40px, 12vw, 120px);
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }

  .rule::after {
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }

  /* ---------- сердце ---------- */
  .heart {
    width: clamp(34px, 6vw, 46px);
    height: auto;
    display: block;
    animation: pulse 2.8s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(214, 178, 124, .35));
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    18%      { transform: scale(1.09); }
    32%      { transform: scale(1); }
  }

  .since {
    font-size: clamp(.78rem, 2.2vw, .95rem);
    font-weight: 300;
    letter-spacing: .42em;
    text-indent: .42em;
    text-transform: uppercase;
    color: rgba(245, 239, 230, .65);
    margin-bottom: clamp(36px, 7vh, 64px);
  }

  /* ---------- карточки счётчика ---------- */
  .timer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(10px, 2vw, 18px);
  }

  .card {
    position: relative;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: linear-gradient(165deg, rgba(255, 255, 255, .055), rgba(255, 255, 255, .015));
    border: 1px solid rgba(214, 178, 124, .22);
    border-radius: 14px;
    box-shadow: 0 24px 48px rgba(0, 0, 0, .45), inset 0 1px 0 rgba(255, 255, 255, .07);
    padding: clamp(22px, 3.2vw, 34px) clamp(14px, 2.6vw, 28px);
    min-width: clamp(128px, 21vw, 190px);
    transition: border-color .4s ease, transform .4s ease;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 18%;
    right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(233, 211, 174, .5), transparent);
  }

  .card:hover {
    border-color: rgba(214, 178, 124, .5);
    transform: translateY(-4px);
  }

  .card .value {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: clamp(2.6rem, 6.5vw, 4.2rem);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  .card .label {
    margin-top: 14px;
    font-size: clamp(.62rem, 1.6vw, .78rem);
    font-weight: 300;
    letter-spacing: .3em;
    text-indent: .3em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }

  .footer {
    margin-top: clamp(36px, 7vh, 60px);
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.25rem, 3vw, 1.7rem);
    letter-spacing: .08em;
    color: rgba(233, 211, 174, .8);
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="content">
  <h1>Мы вместе</h1>

  <div class="rule">
    <svg class="heart" viewBox="0 0 32 29" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M16 27.5C13 24.7 2 16.6 2 9.4 2 5 5.4 1.5 9.7 1.5c2.6 0 5 1.3 6.3 3.4C17.3 2.8 19.7 1.5 22.3 1.5 26.6 1.5 30 5 30 9.4c0 7.2-11 15.3-14 18.1z"
            stroke="#d6b27c" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="since">с 11 июня 2026 года</div>

  <div class="timer">
    <div class="card"><div class="value" id="days">0</div><div class="label" id="days-label">дней</div></div>
    <div class="card"><div class="value" id="hours">0</div><div class="label" id="hours-label">часов</div></div>
    <div class="card"><div class="value" id="minutes">0</div><div class="label" id="minutes-label">минут</div></div>
    <div class="card"><div class="value" id="seconds">0</div><div class="label" id="seconds-label">секунд</div></div>
  </div>

  <div class="footer">Максим&nbsp;&amp;&nbsp;Катя</div>
</div>

<script>
  const START = new Date(2026, 5, 11, 0, 0, 0); // 11 июня 2026

  // правильные русские склонения: 1 день, 2 дня, 5 дней…
  function plural(n, one, few, many) {
    const a = Math.abs(n) % 100;
    const b = a % 10;
    if (a > 10 && a < 20) return many;
    if (b > 1 && b < 5) return few;
    if (b === 1) return one;
    return many;
  }

  const fields = {
    days:    { one: 'день',    few: 'дня',     many: 'дней'   },
    hours:   { one: 'час',     few: 'часа',    many: 'часов'  },
    minutes: { one: 'минута',  few: 'минуты',  many: 'минут'  },
    seconds: { one: 'секунда', few: 'секунды', many: 'секунд' }
  };

  function tick() {
    let diff = Math.max(0, Math.floor((Date.now() - START.getTime()) / 1000));

    const values = {
      days:    Math.floor(diff / 86400),
      hours:   Math.floor(diff / 3600) % 24,
      minutes: Math.floor(diff / 60) % 60,
      seconds: diff % 60
    };

    for (const key in values) {
      document.getElementById(key).textContent = values[key];
      const f = fields[key];
      document.getElementById(key + '-label').textContent = plural(values[key], f.one, f.few, f.many);
    }
  }

  tick();
  setInterval(tick, 1000);

  // медленно поднимающаяся золотая пыль
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('span');
    el.className = 'dust';
    const size = 1.5 + Math.random() * 2.5;
    el.style.width = el.style.height = size + 'px';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '100vh';
    el.style.setProperty('--o', (.25 + Math.random() * .45).toFixed(2));
    el.style.setProperty('--sway', (Math.random() * 60 - 30).toFixed(0) + 'px');
    el.style.animationDuration = (14 + Math.random() * 16) + 's';
    el.style.animationDelay = -(Math.random() * 30) + 's';
    document.body.appendChild(el);
  }
</script>

</body>
</html>
